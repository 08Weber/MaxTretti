<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="MaxTretti"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>MaxTretti</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5522312321049268" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #f5f5f7; --white: #ffffff; --sheet-bg: #ffffff;
      --border: rgba(0,0,0,0.08); --accent: #FF3B30;
      --accent-soft: rgba(255,59,48,0.10); --blue: #007AFF;
      --text: #1c1c1e; --text2: #3a3a3c; --muted: #8e8e93;
      --handle: #d1d1d6; --card-bg: #f5f5f7; --stat-bg: #ffffff; --chip-bg: #f5f5f7;
      --r: 16px; --r-sm: 12px;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    [data-theme="dark"] {
      --bg: #1c1c1e; --white: #2c2c2e; --sheet-bg: #1c1c1e;
      --border: rgba(255,255,255,0.10); --accent: #FF453A;
      --accent-soft: rgba(255,69,58,0.15); --blue: #0A84FF;
      --text: #f2f2f7; --text2: #ebebf5; --muted: #8e8e93;
      --handle: #48484a; --card-bg: #2c2c2e; --stat-bg: #3a3a3c; --chip-bg: #2c2c2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg); color: var(--text);
      transition: background 0.25s, color 0.25s;
    }
    #app { display: flex; flex-direction: column; height: 100dvh; position: relative; }
    #map { flex: 1; z-index: 0; position: relative; }
    .leaflet-container { background: #e8ecf0; font-family: 'Plus Jakarta Sans', sans-serif; }
    .leaflet-control-attribution { font-size: 9px; opacity: 0.5; }
    #topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 1000; padding-top: var(--safe-top); pointer-events: none; }
    .topbar-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px 0; }
    #search-box {
      flex: 1; background: var(--white); border-radius: var(--r);
      box-shadow: 0 2px 20px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden; pointer-events: all; transition: background 0.25s;
    }
    #search-inner { display: flex; align-items: center; padding: 0 14px; height: 50px; gap: 10px; }
    .search-icon { color: var(--muted); font-size: 15px; flex-shrink: 0; }
    #search-input {
      flex: 1; border: none; outline: none; font-family: inherit;
      font-size: 16px; font-weight: 500; color: var(--text);
      background: transparent; -webkit-appearance: none;
    }
    #search-input::placeholder { color: var(--muted); font-weight: 400; }
    #clear-btn {
      width: 22px; height: 22px; background: var(--muted); border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; color: white; font-size: 11px; font-weight: 700;
    }
    #clear-btn.show { display: flex; }
    #suggestions { display: none; border-top: 1px solid var(--border); max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #suggestions.show { display: block; }
    .sug-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      cursor: pointer; border-bottom: 1px solid var(--border); background: var(--white); transition: background 0.1s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:active { background: var(--bg); }
    .sug-pin { width: 32px; height: 32px; background: var(--accent-soft); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .sug-texts { flex: 1; min-width: 0; }
    .sug-main { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug-sub { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fab {
      position: absolute; right: 14px; z-index: 999;
      width: 44px; height: 44px; background: var(--white); border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
      transition: transform 0.15s, background 0.25s, bottom 0.38s cubic-bezier(0.32,0.72,0,1);
    }
    .fab:active { transform: scale(0.92); }
    #ad-banner {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 490;
      display: flex; align-items: center; justify-content: center;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 6px 0 calc(6px + var(--safe-bottom)); min-height: 60px;
      transition: background 0.25s;
    }
    #bottom-sheet {
      position: absolute; left: 0; right: 0;
      background: var(--sheet-bg); border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.10); z-index: 500;
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1), background 0.25s;
      will-change: transform;
    }
    #bottom-sheet.collapsed { transform: translateY(var(--collapse-y, 0px)); }
    #sheet-handle-area {
      width: 100%; padding: 10px 0 6px; display: flex; justify-content: center;
      cursor: grab; user-select: none; touch-action: none;
    }
    #sheet-handle-area:active { cursor: grabbing; }
    .sheet-handle { width: 36px; height: 4px; background: var(--handle); border-radius: 2px; transition: background 0.25s; }
    #sheet-content { overflow: hidden; transition: max-height 0.38s cubic-bezier(0.32,0.72,0,1), opacity 0.25s; }
    #bottom-sheet.collapsed #sheet-content { max-height: 0 !important; opacity: 0; pointer-events: none; }
    .sheet-inner { padding: 0 16px 12px; }
    #vehicle-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .v-chip {
      background: var(--chip-bg); border: 1.5px solid transparent; border-radius: var(--r-sm);
      padding: 10px 4px; text-align: center; cursor: pointer; transition: all 0.18s; user-select: none;
    }
    .v-chip.active { background: var(--accent-soft); border-color: var(--accent); }
    .v-chip .vc-icon { font-size: 20px; margin-bottom: 3px; }
    .v-chip .vc-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .v-chip.active .vc-label { color: var(--accent); }
    .v-chip .vc-speed { font-size: 11px; font-weight: 700; color: var(--text2); margin-top: 1px; }
    .v-chip.active .vc-speed { color: var(--accent); }
    #route-card { display: none; background: var(--card-bg); border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; transition: background 0.25s; }
    #route-card.show { display: block; }
    .route-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .route-dest { flex: 1; font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-close { width: 28px; height: 28px; background: rgba(128,128,128,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .route-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .r-stat { background: var(--stat-bg); border-radius: var(--r-sm); padding: 10px; text-align: center; transition: background 0.25s; }
    .r-stat .rv { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
    .r-stat .ru { font-size: 11px; color: var(--muted); font-weight: 500; }
    .r-stat .rl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
    .btn-go { width: 100%; background: var(--blue); color: white; border: none; border-radius: var(--r-sm); padding: 15px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-go:active { opacity: 0.85; transform: scale(0.98); }
    #steps-panel { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); overflow: hidden; transition: background 0.25s; }
    #steps-panel.show { display: flex; }
    .steps-header { background: var(--white); padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; background: var(--chip-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--blue); flex-shrink: 0; }
    .steps-title { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
    .steps-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .steps-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .step-row { display: flex; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--white); margin-bottom: 1px; align-items: flex-start; transition: background 0.25s; }
    .step-icon-wrap { width: 36px; height: 36px; background: var(--accent-soft); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .step-body { flex: 1; }
    .step-instr { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .step-d { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .open-maps-btn { margin: 16px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r); padding: 15px; text-align: center; font-size: 15px; font-weight: 700; color: var(--blue); cursor: pointer; transition: background 0.15s; }
    .open-maps-btn:active { background: var(--bg); }
    #v-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 3000; display: none; align-items: flex-end; }
    #v-modal.show { display: flex; }
    .v-sheet { width: 100%; background: var(--sheet-bg); border-radius: 24px 24px 0 0; padding: 0 20px; padding-bottom: calc(var(--safe-bottom) + 20px); animation: su 0.28s cubic-bezier(0.32,0.72,0,1); transition: background 0.25s; }
    @keyframes su { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .v-sheet-handle { width: 36px; height: 4px; background: var(--handle); border-radius: 2px; margin: 12px auto 18px; }
    .v-sheet-title { font-size: 19px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
    .v-sheet-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .v-opt { background: var(--chip-bg); border: 1.5px solid transparent; border-radius: var(--r); padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.18s; }
    .v-opt.sel { background: var(--accent-soft); border-color: var(--accent); }
    .v-opt-icon { font-size: 26px; flex-shrink: 0; }
    .v-opt-info { flex: 1; }
    .v-opt-speed { font-size: 20px; font-weight: 800; color: var(--text); }
    .v-opt.sel .v-opt-speed { color: var(--accent); }
    .v-opt-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .v-opt-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--handle); display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.18s; }
    .v-opt.sel .v-opt-check { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-confirm { width: 100%; background: var(--blue); color: white; border: none; border-radius: var(--r-sm); padding: 16px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 14px; transition: opacity 0.15s; }
    .btn-confirm:active { opacity: 0.85; }
    #loading { position: absolute; inset: 0; background: rgba(255,255,255,0.75); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 900; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    [data-theme="dark"] #loading { background: rgba(0,0,0,0.65); }
    #loading.show { display: flex; }
    .spin { width: 32px; height: 32px; border: 3px solid var(--handle); border-top-color: var(--blue); border-radius: 50%; animation: rot 0.7s linear infinite; }
    @keyframes rot { to { transform: rotate(360deg); } }
    .load-txt { font-size: 13px; font-weight: 600; color: var(--muted); }
    #toast { position: fixed; top: calc(var(--safe-top) + 70px); left: 50%; transform: translateX(-50%) translateY(-10px); background: rgba(28,28,30,0.9); color: white; padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="loading"><div class="spin"></div><div class="load-txt" id="load-txt">Beräknar rutt…</div></div>

  <div id="topbar">
    <div class="topbar-inner">
      <div id="search-box">
        <div id="search-inner">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Sök destination…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onInput()" onfocus="onFocus()"/>
          <div id="clear-btn" onclick="clearAll()">✕</div>
        </div>
        <div id="suggestions"></div>
      </div>
    </div>
  </div>

  <div class="fab" id="theme-btn" onclick="toggleTheme()">🌙</div>
  <div class="fab" id="locate-btn" onclick="locateMe()">📍</div>

  <div id="ad-banner">
    <ins class="adsbygoogle"
         style="display:block;width:320px;height:50px;"
         data-ad-client="ca-pub-5522312321049268"
         data-ad-slot="auto"
         data-ad-format="horizontal"
         data-full-width-responsive="false"></ins>
  </div>

  <div id="bottom-sheet">
    <div id="sheet-handle-area"><div class="sheet-handle"></div></div>
    <div id="sheet-content">
      <div class="sheet-inner">
        <div id="route-card">
          <div class="route-top">
            <div class="route-dest" id="route-dest-label">—</div>
            <div class="route-close" onclick="clearAll()">✕</div>
          </div>
          <div class="route-stats">
            <div class="r-stat"><div class="rv" id="stat-time">—</div><div class="rl">Restid</div></div>
            <div class="r-stat"><div class="rv" id="stat-dist">—</div><div class="rl">Sträcka</div></div>
            <div class="r-stat"><div class="rv" id="stat-speed">—</div><div class="ru">km/h</div><div class="rl">Max</div></div>
          </div>
          <button class="btn-go" onclick="openSteps()">🗺 Vägbeskrivning</button>
        </div>
        <div id="vehicle-row">
          <div class="v-chip active" data-speed="45" data-icon="🚗" onclick="pickVehicle(this)"><div class="vc-icon">🚗</div><div class="vc-label">Mopedbil</div><div class="vc-speed">45 km/h</div></div>
          <div class="v-chip" data-speed="30" data-icon="🚜" onclick="pickVehicle(this)"><div class="vc-icon">🚜</div><div class="vc-label">A-traktor</div><div class="vc-speed">30 km/h</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="steps-panel">
  <div class="steps-header">
    <div class="back-btn" onclick="closeSteps()">‹</div>
    <div><div class="steps-title" id="steps-title">Vägbeskrivning</div><div class="steps-sub" id="steps-sub"></div></div>
  </div>
  <div class="steps-scroll"><div id="steps-list"></div><div class="open-maps-btn" onclick="openInMaps()">Öppna i Apple Maps / Google Maps →</div></div>
</div>

<div id="v-modal" onclick="closeVModal(event)">
  <div class="v-sheet">
    <div class="v-sheet-handle"></div>
    <div class="v-sheet-title">Välj fordon</div>
    <div class="v-sheet-sub">Motorvägar undviks alltid — oavsett fordon.</div>
    <div class="v-opt sel" id="vm-45" onclick="vmSelect(45)">
      <span class="v-opt-icon">🚗</span>
      <div class="v-opt-info"><div class="v-opt-speed">45 km/h</div><div class="v-opt-desc">Mopedbil · Moped klass I</div></div>
      <div class="v-opt-check">✓</div>
    </div>
    <div class="v-opt" id="vm-30" onclick="vmSelect(30)">
      <span class="v-opt-icon">🚜</span>
      <div class="v-opt-info"><div class="v-opt-speed">30 km/h</div><div class="v-opt-desc">A-traktor · EPA-traktor · Moped klass II</div></div>
      <div class="v-opt-check"></div>
    </div>
    <button class="btn-confirm" onclick="closeVModalOk()">Bekräfta</button>
  </div>
</div>

<div id="toast"></div>

<script>
const S = {
  speed: 45, icon: '🚗', origin: null, destCoords: null, destName: '',
  route: null, routeLayer: null, shadowLayer: null,
  markers: [], userDot: null, userAccCircle: null, watchId: null,
  theme: 'light', sheetCollapsed: false, didInitialCenter: false
};

// ── MAP ──────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([62.5, 16.5], 5);
const tileLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19 });
const tileDark  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  { attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19 });
tileLight.addTo(map);

// ── THEME ─────────────────────────────────────────────
function toggleTheme() { S.theme = S.theme === 'light' ? 'dark' : 'light'; applyTheme(); }
function applyTheme() {
  document.documentElement.setAttribute('data-theme', S.theme);
  document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '☀️' : '🌙';
  if (S.theme === 'dark') { map.removeLayer(tileLight); tileDark.addTo(map); }
  else { map.removeLayer(tileDark); tileLight.addTo(map); }
  try { localStorage.setItem('mt-theme', S.theme); } catch(_) {}
}
try { const sv = localStorage.getItem('mt-theme'); if (sv === 'dark') { S.theme = 'dark'; applyTheme(); } } catch(_) {}

// ── LAYOUT ───────────────────────────────────────────
const adBannerEl  = document.getElementById('ad-banner');
const sheetEl     = document.getElementById('bottom-sheet');
const contentEl   = document.getElementById('sheet-content');
const handleArea  = document.getElementById('sheet-handle-area');

function getAdHeight() { return adBannerEl.offsetHeight || 0; }
function positionSheet() { sheetEl.style.bottom = getAdHeight() + 'px'; }
function setCollapseVar() {
  const handleH = handleArea.offsetHeight;
  const totalH  = sheetEl.offsetHeight;
  sheetEl.style.setProperty('--collapse-y', (totalH - handleH) + 'px');
}
function collapseSheet() { S.sheetCollapsed = true; setCollapseVar(); sheetEl.classList.add('collapsed'); updateFabPositions(); }
function expandSheet() { S.sheetCollapsed = false; sheetEl.classList.remove('collapsed'); sheetEl.style.transform = ''; setTimeout(updateFabPositions, 400); }
function updateFabPositions() {
  const adH    = getAdHeight();
  const sheetH = S.sheetCollapsed ? handleArea.offsetHeight : sheetEl.offsetHeight;
  const base   = adH + sheetH + 10;
  document.getElementById('locate-btn').style.bottom = base + 'px';
  document.getElementById('theme-btn').style.bottom  = (base + 54) + 'px';
}
let drag = { on: false, startY: 0 };
function dragStart(y) { drag.on = true; drag.startY = y; sheetEl.style.transition = 'none'; }
function dragMove(y) {
  if (!drag.on) return;
  const dy = y - drag.startY;
  const handleH = handleArea.offsetHeight, totalH = sheetEl.offsetHeight;
  const maxDy = totalH - handleH;
  const clamp = Math.max(0, Math.min(dy + (S.sheetCollapsed ? maxDy : 0), maxDy));
  sheetEl.style.transform = 'translateY(' + clamp + 'px)';
}
function dragEnd() {
  if (!drag.on) return; drag.on = false;
  sheetEl.style.transition = ''; sheetEl.style.transform = '';
  const mat = new DOMMatrix(getComputedStyle(sheetEl).transform);
  const cur = mat.m42 || 0;
  const totalH = sheetEl.offsetHeight, handleH = handleArea.offsetHeight;
  if (cur > (totalH - handleH) * 0.38) collapseSheet(); else expandSheet();
}
handleArea.addEventListener('touchstart', e => dragStart(e.touches[0].clientY), { passive: true });
document.addEventListener('touchmove', e => { if (drag.on) dragMove(e.touches[0].clientY); }, { passive: true });
document.addEventListener('touchend', dragEnd);
handleArea.addEventListener('mousedown', e => { dragStart(e.clientY); e.preventDefault(); });
document.addEventListener('mousemove', e => dragMove(e.clientY));
document.addEventListener('mouseup', dragEnd);
handleArea.addEventListener('click', () => { if (S.sheetCollapsed) expandSheet(); });
window.addEventListener('resize', () => { positionSheet(); if (!S.sheetCollapsed) updateFabPositions(); else collapseSheet(); });
setTimeout(() => { positionSheet(); updateFabPositions(); }, 100);

// ── DEST ICON ────────────────────────────────────────
function makeDestIcon() {
  return L.divIcon({ html: '<div style="width:28px;height:36px;display:flex;flex-direction:column;align-items:center;"><div style="width:28px;height:28px;background:#FF3B30;border-radius:50% 50% 50% 4px;transform:rotate(-45deg);box-shadow:0 3px 12px rgba(255,59,48,0.5);border:2.5px solid white;"></div></div>', className: '', iconSize: [28,36], iconAnchor: [14,36] });
}

// ── USER DOT ─────────────────────────────────────────
function placeUserDot(lat, lon, acc) {
  if (S.userAccCircle) { map.removeLayer(S.userAccCircle); S.userAccCircle = null; }
  if (S.userDot)       { map.removeLayer(S.userDot);       S.userDot = null; }
  S.userAccCircle = L.circle([lat,lon], { radius: Math.min(acc||30,150), color:'#007AFF', fillColor:'#007AFF', fillOpacity:0.1, weight:1, opacity:0.25 }).addTo(map);
  S.userDot = L.marker([lat,lon], { icon: L.divIcon({ html:'<div style="width:18px;height:18px;background:#007AFF;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,122,255,0.55);"></div>', className:'', iconSize:[18,18], iconAnchor:[9,9] }), zIndexOffset:1000, interactive:false }).addTo(map);
}

// ── GPS ───────────────────────────────────────────────
function startWatch() {
  if (!navigator.geolocation || S.watchId != null) return;
  S.watchId = navigator.geolocation.watchPosition(
    p => { const {latitude:lat,longitude:lon,accuracy:acc} = p.coords; S.origin={lat,lon}; if(!S.didInitialCenter){S.didInitialCenter=true;map.setView([lat,lon],14);} placeUserDot(lat,lon,acc); },
    ()=>{}, { enableHighAccuracy:true, maximumAge:4000, timeout:10000 }
  );
}
async function getLocation() {
  return new Promise(res => { if(!navigator.geolocation){res(null);return;} navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy}),()=>res(null),{timeout:8000,enableHighAccuracy:true}); });
}
async function locateMe() {
  const loc = await getLocation();
  if (loc) { S.origin=loc; placeUserDot(loc.lat,loc.lon,loc.acc); map.flyTo([loc.lat,loc.lon],15,{duration:1.2}); }
  else showToast('Kunde inte hämta plats');
}

// ── MAP TAP ───────────────────────────────────────────
map.on('click', async function(e) {
  hideSug(); document.getElementById('search-input').blur();
  const {lat,lng:lon} = e.latlng;
  clearDestMarkers();
  S.markers = [L.marker([lat,lon],{icon:makeDestIcon(),zIndexOffset:500}).addTo(map)];
  S.destCoords={lat,lon}; S.destName='Vald plats';
  document.getElementById('search-input').value='Hämtar adress…';
  document.getElementById('clear-btn').classList.add('show');
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=sv',{headers:{'Accept-Language':'sv','User-Agent':'MaxTretti/1.0'}});
    const d = await r.json();
    if (d && d.address) { const a=d.address; const pts=[a.road||a.pedestrian||a.path,a.house_number,a.city||a.town||a.village||a.municipality].filter(Boolean); S.destName=pts.length?pts.slice(0,2).join(' '):d.display_name.split(',')[0]; }
  } catch(_) {}
  document.getElementById('search-input').value=S.destName;
  expandSheet(); calcRoute();
});

// ── SEARCH ───────────────────────────────────────────
let searchTimer, lastQuery='';
function onInput() {
  const q=document.getElementById('search-input').value.trim();
  document.getElementById('clear-btn').classList.toggle('show',q.length>0);
  if(q.length<2){hideSug();return;}
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>fetchSuggestions(q),400);
}
function onFocus() { const q=document.getElementById('search-input').value.trim(); if(q.length>=2)fetchSuggestions(q); }
async function fetchSuggestions(q) {
  if(q===lastQuery)return; lastQuery=q;
  try {
    const r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=8&countrycodes=se&addressdetails=1&accept-language=sv',{headers:{'Accept-Language':'sv','User-Agent':'MaxTretti/1.0'}});
    if(!r.ok)throw new Error();
    renderSuggestions(await r.json());
  } catch(_) {
    try { const r2=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&addressdetails=1&accept-language=sv',{headers:{'Accept-Language':'sv','User-Agent':'MaxTretti/1.0'}}); renderSuggestions(await r2.json()); } catch(__){hideSug();}
  }
}
function renderSuggestions(results) {
  if(!results||!results.length){hideSug();return;}
  const el=document.getElementById('suggestions');
  el.innerHTML=results.map(item=>{
    const lat=parseFloat(item.lat),lon=parseFloat(item.lon),a=item.address||{};
    const name=item.name||a.road||a.pedestrian||a.place||item.display_name.split(',')[0];
    const pts=[]; if(a.road&&name!==a.road)pts.push(a.housenumber?a.road+' '+a.housenumber:a.road); const city=a.city||a.town||a.village||a.municipality||a.county; if(city&&city!==name)pts.push(city);
    const sub=pts.filter(Boolean).join(', '); const icon=getPlaceIcon(item.type,item.class,a);
    return '<div class="sug-item" onclick="pickPlace('+JSON.stringify(name)+','+lat+','+lon+')"><div class="sug-pin">'+icon+'</div><div class="sug-texts"><div class="sug-main">'+escHtml(name)+'</div>'+(sub?'<div class="sug-sub">'+escHtml(sub)+'</div>':'')+'</div></div>';
  }).join('');
  el.classList.add('show');
}
function getPlaceIcon(t,c,a){t=(t||'').toLowerCase();c=(c||'').toLowerCase();if(c==='highway')return'🛣';if(['city','town'].includes(t))return'🏙';if(['village','hamlet','suburb','municipality'].includes(t))return'🏘';if(t==='hospital')return'🏥';if(['school','university'].includes(t))return'🎓';if(['restaurant','cafe','fast_food'].includes(t))return'🍽';if(t==='fuel')return'⛽';if(['hotel','hostel'].includes(t))return'🏨';if(['supermarket','convenience'].includes(t))return'🛒';if(c==='railway'||t==='station')return'🚉';if(['park','forest','wood'].includes(t))return'🌲';if(t==='parking')return'🅿️';if(t==='pharmacy')return'💊';if(c==='amenity')return'🏛';return'📍';}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hideSug(){document.getElementById('suggestions').classList.remove('show');document.getElementById('suggestions').innerHTML='';}
function pickPlace(name,lat,lon){
  document.getElementById('search-input').value=name;document.getElementById('clear-btn').classList.add('show');hideSug();lastQuery='';
  S.destCoords={lat,lon};S.destName=name;clearDestMarkers();S.markers=[L.marker([lat,lon],{icon:makeDestIcon(),zIndexOffset:500}).addTo(map)];
  expandSheet();calcRoute();
}

// ── ROUTING ──────────────────────────────────────────
// ORS API key (decoded from your base64 string)
const ORS_KEY = atob('eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImI2NDYxNWY3MjM3ODRlMjZhOWQ1ZWZlNTUxYTk1NGE0IiwiaCI6Im11cm11cjY0In0=');

function decodePolyline(encoded) {
  var idx=0, lat=0, lng=0, coords=[];
  while (idx < encoded.length) {
    var b, shift=0, result=0;
    do { b=encoded.charCodeAt(idx++)-63; result|=(b&0x1f)<<shift; shift+=5; } while(b>=0x20);
    lat += (result&1) ? ~(result>>1) : (result>>1);
    shift=0; result=0;
    do { b=encoded.charCodeAt(idx++)-63; result|=(b&0x1f)<<shift; shift+=5; } while(b>=0x20);
    lng += (result&1) ? ~(result>>1) : (result>>1);
    coords.push([lng/1e5, lat/1e5]);
  }
  return coords;
}

async function fetchORS(oLon, oLat, dLon, dLat) {
  // Try with highway avoidance first, fall back to no avoidance
  const attempts = [
    { options: { avoid_features: ['highways'] } },
    {}
  ];

  for (var i = 0; i < attempts.length; i++) {
    var body = {
      coordinates: [[oLon, oLat], [dLon, dLat]],
      instructions: true,
      instructions_format: 'text',
      language: 'sv'
    };
    if (attempts[i].options) body.options = attempts[i].options;

    try {
      var ctrl = new AbortController();
      var tid = setTimeout(function() { ctrl.abort(); }, 15000);

      var r = await fetch('https://api.openrouteservice.org/v2/directions/driving-car', {
        method: 'POST',
        signal: ctrl.signal,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': ORS_KEY   // ← fixed: decoded key sent directly
        },
        body: JSON.stringify(body)
      });
      clearTimeout(tid);

      var data = null;
      try { data = await r.json(); } catch(je) { console.warn('ORS JSON parse error:', je); }

      if (!r.ok) {
        console.warn('ORS attempt', i, 'HTTP', r.status, data);
        // Log the error detail for debugging
        if (data && data.error) console.warn('ORS error detail:', data.error);
        continue;
      }

      if (data && data.routes && data.routes.length > 0) {
        console.log('ORS success on attempt', i, data.routes[0].summary);
        return data;
      }
      console.warn('ORS attempt', i, ': unexpected response structure', data);
    } catch(e) {
      console.warn('ORS fetch error attempt', i, ':', e.message);
    }
  }

  // Final fallback: OSRM (free, no key needed)
  return fetchOSRM(oLon, oLat, dLon, dLat);
}

// OSRM fallback — always works, no API key required
async function fetchOSRM(oLon, oLat, dLon, dLat) {
  try {
    showToast('🔄 Använder reservrutt…');
    var url = 'https://router.project-osrm.org/route/v1/driving/'
      + oLon + ',' + oLat + ';' + dLon + ',' + dLat
      + '?overview=full&geometries=geojson&steps=true';
    var r = await fetch(url);
    if (!r.ok) throw new Error('OSRM HTTP ' + r.status);
    var data = await r.json();
    if (!data.routes || !data.routes[0]) throw new Error('No OSRM route');
    // Convert OSRM format to ORS-like format for parseORS
    var route = data.routes[0];
    return {
      routes: [{
        summary: { distance: route.distance, duration: route.duration },
        geometry: route.geometry, // already GeoJSON from OSRM
        segments: [{
          steps: route.legs[0].steps.map(function(s) {
            return {
              distance: s.distance,
              duration: s.duration,
              type: 1,
              name: s.name || '',
              instruction: s.maneuver.type.replace(/_/g,' ')
            };
          })
        }]
      }]
    };
  } catch(e) {
    console.error('OSRM fallback error:', e);
    return null;
  }
}

function parseORS(data) {
  if (!data || !data.routes || !data.routes[0]) return null;
  var route = data.routes[0];
  var seg = (route.segments && route.segments[0]) || {};
  var coordinates;

  if (typeof route.geometry === 'string') {
    coordinates = decodePolyline(route.geometry);
  } else if (route.geometry && route.geometry.coordinates) {
    coordinates = route.geometry.coordinates;
  } else {
    return null;
  }

  return {
    distance: route.summary.distance,
    duration: route.summary.duration,
    geometry: { type: 'LineString', coordinates: coordinates },
    legs: [{
      steps: (seg.steps || []).map(function(s) {
        return {
          distance: s.distance,
          name: s.name || '',
          maneuver: { type: mapORSType(s.type) },
          instruction: s.instruction || s.name || ''
        };
      })
    }]
  };
}

function mapORSType(n) {
  var m = {0:'depart',1:'turn',2:'turn',3:'turn',4:'turn',5:'merge',6:'fork',7:'fork',8:'ramp',9:'ramp',10:'roundabout',11:'rotary',12:'continue',13:'new name',14:'arrive'};
  return m[n] || 'continue';
}

async function calcRoute() {
  if (!S.destCoords) return;
  showLoading(true, 'Beräknar rutt…');
  document.getElementById('route-card').classList.remove('show');

  if (!S.origin) {
    showLoading(true, 'Hämtar position…');
    S.origin = await getLocation();
    if (!S.origin) {
      S.origin = { lat: 59.3293, lon: 18.0686 };
      showToast('📍 Startplats: Stockholm');
    }
  }

  try {
    const { lat: oLat, lon: oLon } = S.origin;
    const { lat: dLat, lon: dLon } = S.destCoords;
    const data = await fetchORS(oLon, oLat, dLon, dLat);

    if (!data) {
      showToast('❌ Ingen rutt hittades');
      showLoading(false);
      return;
    }

    S.route = parseORS(data);
    if (!S.route) {
      showToast('❌ Ingen rutt hittades');
      showLoading(false);
      return;
    }

    drawRoute(S.route);
    showStats();
  } catch(e) {
    console.error('calcRoute error:', e);
    showToast('❌ Fel vid ruttberäkning');
  }
  showLoading(false);
}

function clearDestMarkers() { S.markers.forEach(m => map.removeLayer(m)); S.markers = []; }

function drawRoute(route) {
  if (S.shadowLayer) { map.removeLayer(S.shadowLayer); S.shadowLayer = null; }
  if (S.routeLayer)  { map.removeLayer(S.routeLayer);  S.routeLayer  = null; }
  clearDestMarkers();
  const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
  S.shadowLayer = L.polyline(coords, { color:'rgba(0,0,0,0.13)', weight:9,  lineCap:'round', lineJoin:'round' }).addTo(map);
  S.routeLayer  = L.polyline(coords, { color:'#007AFF',           weight:5,  opacity:0.9, lineCap:'round', lineJoin:'round' }).addTo(map);
  S.markers = [L.marker([S.destCoords.lat, S.destCoords.lon], { icon: makeDestIcon(), zIndexOffset: 500 }).addTo(map)];
  map.fitBounds(S.routeLayer.getBounds(), { padding: [70, 70] });
}

function showStats() {
  const dist = S.route.distance;
  const avgSpeed = S.speed * 0.82;
  const mins = Math.round((dist / 1000) / avgSpeed * 60);
  const h = Math.floor(mins / 60), m = mins % 60;
  document.getElementById('stat-time').textContent  = mins < 60 ? (mins + ' min') : (h + 'h ' + m + 'm');
  document.getElementById('stat-dist').textContent  = dist < 1000 ? (Math.round(dist) + ' m') : ((dist / 1000).toFixed(1) + ' km');
  document.getElementById('stat-speed').textContent = S.speed;
  document.getElementById('route-dest-label').textContent = S.destName;
  document.getElementById('route-card').classList.add('show');
}

// ── CLEAR ─────────────────────────────────────────────
function clearAll() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').classList.remove('show');
  hideSug();
  document.getElementById('route-card').classList.remove('show');
  S.destCoords = null; S.route = null; lastQuery = '';
  if (S.shadowLayer) { map.removeLayer(S.shadowLayer); S.shadowLayer = null; }
  if (S.routeLayer)  { map.removeLayer(S.routeLayer);  S.routeLayer  = null; }
  clearDestMarkers();
  if (S.origin) map.setView([S.origin.lat, S.origin.lon], 14);
  else map.setView([62.5, 16.5], 5);
}

// ── STEPS ─────────────────────────────────────────────
function openSteps() {
  if (!S.route) return;
  const steps = S.route.legs[0].steps || [];
  document.getElementById('steps-title').textContent = 'Till ' + S.destName;
  const avg = S.speed * 0.82, mins = Math.round((S.route.distance / 1000) / avg * 60);
  const h = Math.floor(mins / 60), m = mins % 60;
  document.getElementById('steps-sub').textContent = (mins < 60 ? mins + ' min' : h + 'h ' + m + 'm') + ' · ' + (S.route.distance / 1000).toFixed(1) + ' km';
  const mI = t => ({'depart':'🚦','arrive':'🏁','turn':'↩️','merge':'🔀','new name':'➡️','continue':'➡️','roundabout':'🔄','rotary':'🔄','fork':'↗️','ramp':'↗️','end of road':'↩️'}[t] || '➡️');
  document.getElementById('steps-list').innerHTML = steps.map(s => {
    const t = s.maneuver.type;
    const instr = s.instruction || t;
    const dist = s.distance < 1000 ? Math.round(s.distance) + ' m' : (s.distance / 1000).toFixed(1) + ' km';
    return '<div class="step-row"><div class="step-icon-wrap">' + mI(t) + '</div><div class="step-body"><div class="step-instr">' + escHtml(instr) + '</div>' + (s.distance > 10 ? '<div class="step-d">' + dist + '</div>' : '') + '</div></div>';
  }).join('');
  document.getElementById('steps-panel').classList.add('show');
}
function closeSteps() { document.getElementById('steps-panel').classList.remove('show'); }
function openInMaps() {
  if (!S.destCoords) return;
  const { lat: dLat, lon: dLon } = S.destCoords;
  const { lat: oLat, lon: oLon } = S.origin || { lat: 0, lon: 0 };
  window.open(/iPad|iPhone|iPod/.test(navigator.userAgent)
    ? 'maps://maps.apple.com/?saddr=' + oLat + ',' + oLon + '&daddr=' + dLat + ',' + dLon + '&dirflg=d'
    : 'https://www.google.com/maps/dir/' + oLat + ',' + oLon + '/' + dLat + ',' + dLon);
}

// ── VEHICLE ───────────────────────────────────────────
function pickVehicle(el) { document.querySelectorAll('.v-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); S.speed = parseInt(el.dataset.speed); S.icon = el.dataset.icon; syncVModal(); if (S.destCoords) calcRoute(); }
function openVModal() { document.getElementById('v-modal').classList.add('show'); }
function closeVModal(e) { if (e.target === document.getElementById('v-modal')) document.getElementById('v-modal').classList.remove('show'); }
function closeVModalOk() { document.getElementById('v-modal').classList.remove('show'); if (S.destCoords) calcRoute(); }
function vmSelect(speed) { S.speed = speed; syncVModal(); }
function syncVModal() {
  document.getElementById('vm-45').classList.toggle('sel', S.speed === 45);
  document.getElementById('vm-30').classList.toggle('sel', S.speed === 30);
  document.getElementById('vm-45').querySelector('.v-opt-check').textContent = S.speed === 45 ? '✓' : '';
  document.getElementById('vm-30').querySelector('.v-opt-check').textContent = S.speed === 30 ? '✓' : '';
}

// ── HELPERS ──────────────────────────────────────────
function showLoading(v, msg) { document.getElementById('loading').classList.toggle('show', v); if (msg) document.getElementById('load-txt').textContent = msg; }
let toastT;
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2600); }

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') { e.target.blur(); document.querySelector('.sug-item') && document.querySelector('.sug-item').click(); } });
document.addEventListener('touchstart', e => { if (!document.getElementById('search-box').contains(e.target)) hideSug(); }, { passive: true });

(function() { try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {} })();

startWatch();
</script>
